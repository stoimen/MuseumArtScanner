<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Museum Art Scanner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e;
    color: #e0d6c2;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .key-prompt {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(26,26,46,.95);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
  }
  .key-prompt.hidden { display: none; }
  .key-prompt h1 { font-size: 22px; color: #f0e6d3; margin-bottom: 6px; }
  .key-prompt .subtitle { color: #c4b89a; font-size: 13px; text-align: center; margin-bottom: 20px; max-width: 320px; line-height: 1.5; }
  .key-prompt .subtitle a { color: #c9a96e; text-decoration: underline; }
  .key-prompt input {
    width: 100%; max-width: 320px;
    padding: 14px 16px; margin-bottom: 14px;
    border: 1px solid #334155; border-radius: 12px;
    background: #16213e; color: #e0d6c2; font-size: 16px;
    outline: none;
  }
  .key-prompt input::placeholder { color: #556677; }
  .key-prompt .btn-save {
    background: #c9a96e; color: #1a1a2e;
    border: none; border-radius: 25px;
    padding: 14px 44px; font-size: 16px; font-weight: 700;
    cursor: pointer; letter-spacing: .5px;
  }
  .key-prompt .btn-save:disabled { opacity: .4; }

  .camera-screen { position: relative; width: 100%; height: 100dvh; display: none; flex-direction: column; }
  .camera-screen.active { display: flex; }
  #videoFeed { width: 100%; height: 100%; object-fit: cover; background: #000; }
  .cam-top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    background: rgba(26,26,46,.65);
    padding: 52px 16px 12px; text-align: center;
  }
  .cam-top-bar h2 { font-size: 18px; font-weight: 700; color: #f0e6d3; letter-spacing: 1px; }
  .cam-bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    background: rgba(26,26,46,.65);
    padding: 16px 16px 40px; display: flex;
    justify-content: center; gap: 12px;
  }
  .btn-capture {
    background: #c9a96e; color: #1a1a2e;
    border: none; border-radius: 30px;
    padding: 16px 36px; font-size: 17px; font-weight: 700;
    cursor: pointer; min-width: 170px; letter-spacing: .5px;
  }
  .btn-capture:disabled { opacity: .5; }

  .result-screen { display: none; flex-direction: column; align-items: center; padding: 48px 16px 40px; min-height: 100dvh; }
  .result-screen.active { display: flex; }
  .result-screen img { width: 100%; max-width: 420px; border-radius: 12px; margin-bottom: 20px; }
  .result-card {
    background: #16213e; border-radius: 12px; padding: 20px;
    width: 100%; max-width: 420px;
    border-left: 4px solid #c9a96e;
    white-space: pre-wrap; font-size: 15px; line-height: 1.6;
    margin-bottom: 20px;
  }
  .action-bar { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn-action {
    border: none; border-radius: 25px;
    padding: 14px 24px; font-size: 15px; font-weight: 600;
    cursor: pointer; color: #fff; min-width: 130; text-align: center;
  }
  .btn-speak { background: #c9a96e; color: #1a1a2e; }
  .btn-again { background: #334155; }

  .loading { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 40px 16px; min-height: 100dvh; }
  .loading.active { display: flex; }
  .spinner { width: 48px; height: 48px; border: 4px solid #334155; border-top-color: #c9a96e; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 20px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p { color: #c4b89a; font-size: 16px; }

  canvas { display: none; }
</style>
</head>
<body>

<div class="key-prompt hidden" id="keyPrompt">
  <h1>Museum Art Scanner</h1>
  <p class="subtitle">
    One-time setup: paste your free Google Gemini API key.<br>
    <a href="https://aistudio.google.com/app/apikey" target="_blank">Get a free key here</a> (just sign in with Google)
  </p>
  <input type="password" id="apiKeyInput" placeholder="AIza...">
  <button class="btn-save" id="btnSaveKey" disabled>Start Scanning</button>
</div>

<div class="camera-screen" id="cameraScreen">
  <video id="videoFeed" autoplay playsinline muted></video>
  <div class="cam-top-bar"><h2>Museum Art Scanner</h2></div>
  <div class="cam-bottom-bar">
    <button class="btn-capture" id="btnCapture">Scan Artwork</button>
  </div>
</div>

<div class="loading" id="loadingScreen">
  <div class="spinner"></div>
  <p id="loadingText">Analyzing artwork...</p>
</div>

<div class="result-screen" id="resultScreen">
  <img id="resultImage" src="" alt="Captured artwork">
  <div class="result-card" id="resultText"></div>
  <div class="action-bar">
    <button class="btn-action btn-speak" id="btnSpeak">Read Aloud</button>
    <button class="btn-action btn-again" id="btnAgain">Scan Another</button>
  </div>
</div>

<canvas id="canvas"></canvas>

<script>
const keyPrompt     = document.getElementById('keyPrompt');
const cameraScreen  = document.getElementById('cameraScreen');
const loadingScreen = document.getElementById('loadingScreen');
const resultScreen  = document.getElementById('resultScreen');
const apiKeyInput   = document.getElementById('apiKeyInput');
const btnSaveKey    = document.getElementById('btnSaveKey');
const videoFeed     = document.getElementById('videoFeed');
const btnCapture    = document.getElementById('btnCapture');
const loadingText   = document.getElementById('loadingText');
const resultImage   = document.getElementById('resultImage');
const resultText    = document.getElementById('resultText');
const btnSpeak      = document.getElementById('btnSpeak');
const btnAgain      = document.getElementById('btnAgain');
const canvas        = document.getElementById('canvas');

let stream = null;
let speaking = false;

const PROMPT = `You are an expert museum guide and art historian.

Analyze the painting in the image and return your answer in clear sections using the exact headings below:

1) Artwork Snapshot
- Title (or "Unknown")
- Artist (or "Unknown")
- Date/Period
- Medium/Style

2) What You See
- Brief visual description in 2-4 sentences.

3) Attribution Confidence
- Confidence level: High / Medium / Low
- Evidence for attribution (style, technique, subject, provenance clues)
- If uncertain, explicitly say what is unknown.

4) Historical Context
- 3-5 concise bullet points with historical/art-movement context.

5) Interesting Fact for Visitors
- One short, memorable fact suitable for audio narration.

Rules:
- Do not invent facts. If unsure, say "Unknown" and explain uncertainty.
- Distinguish clearly between observation and inference.
- Keep total response under 220 words.
- Use visitor-friendly language for a general audience.`;

function getKey() { return (localStorage.getItem('mas_key') || '').trim(); }
function saveKey(k) { localStorage.setItem('mas_key', k.trim()); }

function show(screen) {
  [cameraScreen, loadingScreen, resultScreen].forEach(s => s.classList.remove('active'));
  keyPrompt.classList.add('hidden');
  if (screen === keyPrompt) { keyPrompt.classList.remove('hidden'); }
  else { screen.classList.add('active'); }
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    videoFeed.srcObject = stream;
  } catch (e) {
    alert('Camera access is required. Please allow camera access and reload.');
  }
}
function stopCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function capturePhoto() {
  const ctx = canvas.getContext('2d');
  canvas.width = videoFeed.videoWidth;
  canvas.height = videoFeed.videoHeight;
  ctx.drawImage(videoFeed, 0, 0);
  return canvas.toDataURL('image/jpeg', 0.7);
}

const MODELS = [
  'gemini-2.5-flash-lite',
  'gemini-2.5-flash',
  'gemini-2.5-pro'
];

async function tryModel(model, base64, apiKey) {
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ role: 'user', parts: [
        { text: PROMPT },
        { inlineData: { mimeType: 'image/jpeg', data: base64 } }
      ]}]
    })
  });
  const data = await resp.json();
  if (!resp.ok) throw { status: resp.status, data };
  if (data.promptFeedback?.blockReason) throw new Error(`Blocked: ${data.promptFeedback.blockReason}`);
  const text = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('').trim();
  if (!text) throw new Error('No analysis returned.');
  return text;
}

async function analyze(base64DataUrl) {
  const apiKey = getKey();
  const base64 = base64DataUrl.split(',')[1];
  let lastError = null;
  for (const model of MODELS) {
    try {
      return await tryModel(model, base64, apiKey);
    } catch (e) {
      lastError = e;
      if (e.status === 400 && e.data?.error?.message?.includes('API key')) {
        localStorage.removeItem('mas_key');
        throw new Error('Invalid API key. Please re-enter your key.');
      }
      if (e.status === 404 || e.status === 429 || (e.data?.error?.message?.includes('no longer available'))) {
        continue;
      }
      throw new Error(e.data?.error?.message || e.message || 'Gemini error');
    }
  }
  throw new Error(lastError?.data?.error?.message || 'All models failed. Please try again later.');
}

function toggleSpeak(text) {
  if (speaking) {
    speechSynthesis.cancel();
    speaking = false;
    btnSpeak.textContent = 'Read Aloud';
    return;
  }
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.9;
  utter.onend = () => { speaking = false; btnSpeak.textContent = 'Read Aloud'; };
  speechSynthesis.speak(utter);
  speaking = true;
  btnSpeak.textContent = 'Stop Reading';
}

apiKeyInput.addEventListener('input', () => { btnSaveKey.disabled = !apiKeyInput.value.trim(); });
btnSaveKey.addEventListener('click', async () => {
  saveKey(apiKeyInput.value);
  await startCamera();
  show(cameraScreen);
});

btnCapture.addEventListener('click', async () => {
  btnCapture.disabled = true;
  const dataUrl = capturePhoto();
  show(loadingScreen);
  stopCamera();

  try {
    const result = await analyze(dataUrl);
    resultImage.src = dataUrl;
    resultText.textContent = result;
    show(resultScreen);
  } catch (e) {
    alert('Analysis failed: ' + e.message);
    if (!getKey()) { show(keyPrompt); }
    else { await startCamera(); show(cameraScreen); }
  } finally {
    btnCapture.disabled = false;
  }
});

btnSpeak.addEventListener('click', () => { toggleSpeak(resultText.textContent); });

btnAgain.addEventListener('click', async () => {
  speechSynthesis.cancel();
  speaking = false;
  btnSpeak.textContent = 'Read Aloud';
  await startCamera();
  show(cameraScreen);
});

(async () => {
  if (getKey()) {
    await startCamera();
    show(cameraScreen);
  } else {
    show(keyPrompt);
  }
})();
</script>
</body>
</html>
